<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background stripes pink/turquoise -->
  <defs>
    <clipPath id="clip"><circle cx="32" cy="32" r="32"/></clipPath>
  </defs>
  <g clip-path="url(#clip)">
    <rect width="64" height="64" fill="#2dd4bf"/>
    <rect x="0"  width="8"  height="64" fill="#ec4899"/>
    <rect x="16" width="8"  height="64" fill="#ec4899"/>
    <rect x="32" width="8"  height="64" fill="#ec4899"/>
    <rect x="48" width="8"  height="64" fill="#ec4899"/>
  </g>
  <!-- Inner cream circle -->
  <circle cx="32" cy="32" r="24" fill="#FFF8F0"/>
  <!-- Brown ring -->
  <circle cx="32" cy="32" r="24" fill="none" stroke="#8B5E3C" stroke-width="2"/>
  <!-- BN text -->
  <text x="32" y="30" text-anchor="middle" dominant-baseline="middle" font-family="Georgia, serif" font-weight="bold" font-size="18" fill="#5D3A1A" letter-spacing="-1">BN</text>
  <!-- Coffee bean -->
  <g transform="translate(32,44)" fill="#5D3A1A">
    <ellipse cx="-5" cy="0" rx="4" ry="3" transform="rotate(-20)"/>
    <ellipse cx="5" cy="0" rx="4" ry="3" transform="rotate(20)"/>
    <line x1="-5" y1="-1" x2="-5" y2="1" stroke="#FFF8F0" stroke-width="0.8" transform="rotate(-20)"/>
    <line x1="5" y1="-1" x2="5" y2="1" stroke="#FFF8F0" stroke-width="0.8" transform="rotate(20)"/>
  </g>
</svg>