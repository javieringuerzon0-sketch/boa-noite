<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/jpeg" sizes="192x192" href="/logo-boanoite.jpg" />
    <link rel="apple-touch-icon" href="/logo-boanoite.jpg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Boa Noite — Café de Especialidad & Helados sobre Ruedas</title>

    <!-- SEO -->
    <meta name="description" content="Café de especialidad y helados artesanales sobre ruedas. Catering premium para matrimonios, eventos corporativos y festivales en Santiago de Chile." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://boanoite.cl/" />

    <!-- Open Graph (WhatsApp, Facebook, Instagram) -->
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="es_CL" />
    <meta property="og:site_name" content="Boa Noite" />
    <meta property="og:title" content="Boa Noite — Café de Especialidad & Helados sobre Ruedas" />
    <meta property="og:description" content="Café de especialidad y helados artesanales sobre ruedas. Catering premium para eventos en Santiago." />
    <meta property="og:image" content="https://boanoite.cl/poster-hero.jpg" />
    <meta property="og:url" content="https://boanoite.cl/" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Boa Noite — Café de Especialidad & Helados sobre Ruedas" />
    <meta name="twitter:description" content="Café de especialidad y helados artesanales sobre ruedas. Catering premium para eventos en Santiago." />
    <meta name="twitter:image" content="https://boanoite.cl/poster-hero.jpg" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FoodEstablishment",
      "name": "Boa Noite",
      "description": "Café de especialidad y helados artesanales sobre ruedas. Catering premium para matrimonios, eventos corporativos y festivales en Santiago de Chile.",
      "image": "https://boanoite.cl/poster-hero.jpg",
      "telephone": "+56 9 6727 0078",
      "url": "https://boanoite.cl",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Santiago",
        "addressRegion": "Región Metropolitana",
        "addressCountry": "CL"
      },
      "priceRange": "$$",
      "servesCuisine": ["Café de especialidad", "Helados artesanales"],
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.9",
        "reviewCount": "2400"
      },
      "sameAs": [
        "https://www.instagram.com/boanoitecafe/"
      ]
    }
    </script>

    <!-- DNS / connection hints -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Font: only the weights actually used -->
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600;700;800&display=swap" rel="stylesheet" />

    <!-- Preload hero poster so it shows instantly before video loads -->
    <link rel="preload" as="image" href="/poster-hero.jpg" fetchpriority="high" />

    <!-- Preload hero video: 2K desktop, 1080p mobile -->
    <link rel="preload" as="video" href="/boa-noite-hero.mp4" media="(min-width: 768px)" />
    <link rel="preload" as="video" href="/boa-noite-hero-mobile.mp4" media="(max-width: 767px)" />

    <!-- Theme color for mobile browser chrome -->
    <meta name="theme-color" content="#09090b" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
